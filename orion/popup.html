<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EDH Power Level Exporter</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600&display=swap');

    :root {
      --bg:        #0d0d12;
      --surface:   #16161f;
      --border:    #2a2a3a;
      --accent:    #c8973a;
      --accent2:   #8b2be2;
      --text:      #e8e4d8;
      --muted:     #6b6880;
      --success:   #3ecf7e;
      --error:     #e2483d;
      --card:      #1c1c28;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      min-height: 200px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1a0a2e 0%, #0d1a2e 100%);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.06em;
      line-height: 1;
    }

    .header-text p {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
      letter-spacing: 0.04em;
    }

    /* Body */
    .body {
      padding: 14px 16px;
    }

    /* Site detection badge */
    .site-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .site-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .site-dot.active { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .site-dot.error  { background: var(--error); }

    .site-label {
      flex: 1;
      font-size: 12px;
      color: var(--text);
    }

    .site-name {
      font-weight: 600;
      color: var(--accent);
    }

    /* Info block */
    .deck-info {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
      display: none;
    }

    .deck-info.visible { display: block; }

    .deck-info-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }

    .deck-info-row:last-child { margin-bottom: 0; }

    .di-label { color: var(--muted); font-size: 11px; }
    .di-value { font-size: 12px; font-weight: 600; }
    .di-commander { color: var(--accent); }

    /* Warnings */
    .warning {
      background: #1f1510;
      border: 1px solid #6b3d1a;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 11px;
      color: #e8a86a;
      margin-bottom: 10px;
      display: none;
      line-height: 1.5;
    }
    .warning.visible { display: block; }

    /* CTA button */
    .btn-export {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, var(--accent2) 0%, #5a1fa0 100%);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-export:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .btn-export:active:not(:disabled) { transform: translateY(0); }
    .btn-export:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-export .btn-icon { font-size: 16px; }

    /* Status message */
    .status {
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 11px;
      line-height: 1.5;
      display: none;
      text-align: center;
    }

    .status.visible { display: block; }
    .status.success { background: #0d2a1a; border: 1px solid #1d5c38; color: var(--success); }
    .status.error   { background: #2a0d0d; border: 1px solid #5c1d1d; color: #f08080; }
    .status.loading { background: var(--card); border: 1px solid var(--border); color: var(--muted); }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 4px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Auto-open toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .toggle-label { font-size: 11px; color: var(--muted); }
    .toggle { position: relative; width: 32px; height: 18px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0;
      background: var(--border); border-radius: 18px;
      cursor: pointer; transition: background 0.2s;
    }
    .toggle-track::after {
      content: ''; position: absolute;
      width: 12px; height: 12px; left: 3px; top: 3px;
      background: #fff; border-radius: 50%; transition: transform 0.2s;
    }
    .toggle input:checked + .toggle-track { background: var(--accent2); }
    .toggle input:checked + .toggle-track::after { transform: translateX(14px); }

    /* Footer */
    .footer {
      padding: 8px 16px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 10px;
      color: var(--muted);
    }
  </style>
</head>
<body>

<div class="header">
  <!-- Inline SVG logo -->
  <svg class="logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="32" height="32" rx="8" fill="#1a0a2e"/>
    <path d="M16 4L28 10V22L16 28L4 22V10L16 4Z" fill="none" stroke="#c8973a" stroke-width="1.5"/>
    <path d="M16 8L24 12V20L16 24L8 20V12L16 8Z" fill="#2a1a4e"/>
    <path d="M13 16C13 14.34 14.34 13 16 13C17.66 13 19 14.34 19 16C19 17.66 17.66 19 16 19" stroke="#c8973a" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M16 10V13M16 19V22M10 16H13M22 16H19" stroke="#8b2be2" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
  <div class="header-text">
    <h1>EDH POWER LEVEL</h1>
    <p>Commander Deck Exporter</p>
  </div>
</div>

<div class="body">

  <div class="site-badge">
    <div class="site-dot" id="siteDot"></div>
    <div class="site-label">
      <span id="siteLabel">Detecting site…</span>
    </div>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Auto-analyze &amp; open on EDH Power Level</span>
    <label class="toggle">
      <input type="checkbox" id="autoOpen">
      <span class="toggle-track"></span>
    </label>
  </div>

  <div class="deck-info" id="deckInfo">
    <div class="deck-info-row">
      <span class="di-label">Commander</span>
      <span class="di-value di-commander" id="infoCommander">—</span>
    </div>
    <div class="deck-info-row">
      <span class="di-label">Main deck cards</span>
      <span class="di-value" id="infoCount">—</span>
    </div>
    <div class="deck-info-row">
      <span class="di-label">Skipped categories</span>
      <span class="di-value" id="infoSkipped">—</span>
    </div>
  </div>

  <div class="warning" id="warningBox"></div>

  <button class="btn-export" id="btnExport" disabled>
    <span class="btn-icon">⚔</span>
    Analyze Deck
  </button>

  <div class="status" id="statusBox"></div>

</div>

<div class="footer">Supports Archidekt · Moxfield</div>

<script src="popup.js"></script>
</body>
</html>
